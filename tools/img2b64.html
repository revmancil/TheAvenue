<!DOCTYPE html>
<html>
<head><title>Image to Base64</title></head>
<body>
<h2>Image → Base64 Data URI</h2>
<p>Upload an image to get its base64 data URI for embedding:</p>
<input type="file" id="fileInput" accept="image/*" /><br><br>
<div id="output" style="word-break:break-all;font-family:monospace;font-size:11px;background:#f5f5f5;padding:10px;max-height:300px;overflow:auto;"></div>
<button onclick="copyOutput()">Copy</button>
<script>
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const result = ev.target.result;
    document.getElementById('output').textContent = result;
    console.log('LENGTH:', result.length);
    console.log('PREVIEW:', result.substring(0, 80));
  };
  reader.readAsDataURL(file);
});
function copyOutput() {
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(() => alert('Copied! Length: ' + text.length));
}
</script>
</body>
</html>
